<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 3).join('/');
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/?p=' + encodeURIComponent(l.pathname.slice(base.length) + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body></body>
</html>
