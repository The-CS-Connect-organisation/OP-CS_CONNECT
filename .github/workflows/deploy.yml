name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build academics
      - name: Install academics deps
        run: npm install
        working-directory: academics

      - name: Build academics
        run: npm run build
        working-directory: academics
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Build management
      - name: Install management deps
        run: npm install
        working-directory: Management

      - name: Build management
        run: npm run build
        working-directory: Management
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Combine both builds
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy/academics
          mkdir -p deploy/management
          cp -r academics/dist/* deploy/academics/
          cp -r Management/dist/* deploy/management/

          # 404.html for academics — redirects back to index with path preserved
          cat > deploy/academics/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <script>
              // GitHub Pages SPA redirect trick
              // Encode the path into the query string and redirect to index.html
              var l = window.location;
              l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 2).join('/') +
                '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.indexOf('/', 1)) + l.search) +
                (l.hash || '')
              );
            </script>
          </head>
          <body></body>
          </html>
          EOF

          # 404.html for management — same trick
          cat > deploy/management/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <script>
              var l = window.location;
              l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 2).join('/') +
                '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.indexOf('/', 1)) + l.search) +
                (l.hash || '')
              );
            </script>
          </head>
          <body></body>
          </html>
          EOF

          # Inject the redirect receiver into academics index.html
          sed -i 's|<head>|<head><script>!function(){var e=window.location.search;if(e){var t=new URLSearchParams(e),p=t.get("p");if(p){window.history.replaceState(null,null,p);}}}();</script>|' deploy/academics/index.html

          # Inject the redirect receiver into management index.html
          sed -i 's|<head>|<head><script>!function(){var e=window.location.search;if(e){var t=new URLSearchParams(e),p=t.get("p");if(p){window.history.replaceState(null,null,p);}}}();</script>|' deploy/management/index.html
          # Root landing page
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Cornerstone SchoolSync</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: sans-serif; background: #0f172a; color: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 2rem; }
              h1 { font-size: 2rem; font-weight: 700; }
              p { color: #94a3b8; }
              .cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
              a { display: flex; flex-direction: column; gap: 0.5rem; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2rem 3rem; text-decoration: none; color: inherit; transition: border-color 0.2s; }
              a:hover { border-color: #6366f1; }
              a h2 { font-size: 1.25rem; }
              a p { font-size: 0.875rem; }
            </style>
          </head>
          <body>
            <h1>Cornerstone SchoolSync</h1>
            <p>Select a portal to continue</p>
            <div class="cards">
              <a href="./academics/">
                <h2>🎓 Academics Portal</h2>
                <p>For Students &amp; Teachers</p>
              </a>
              <a href="./management/">
                <h2>🏢 Management Portal</h2>
                <p>For Admins &amp; Parents</p>
              </a>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
