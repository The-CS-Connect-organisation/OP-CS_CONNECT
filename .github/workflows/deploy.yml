name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build landing (if exists)
      - name: Check landing directory
        id: landing
        run: |
          if [ -d "academics/landing" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          elif [ -d "landing" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install landing deps
        if: steps.landing.outputs.exists == 'true'
        run: |
          if [ -d "academics/landing" ]; then
            cd academics/landing && npm install
          else
            cd landing && npm install
          fi

      - name: Build landing
        if: steps.landing.outputs.exists == 'true'
        run: |
          if [ -d "academics/landing" ]; then
            cd academics/landing && npm run build
          else
            cd landing && npm run build
          fi

      # Build unified app (academics + management merged)
      - name: Install app deps
        run: npm install
        working-directory: academics

      - name: Build app
        run: npm run build
        working-directory: academics
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Deploy: landing at root (if built), app at /academics/
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy/academics
          cp -r academics/dist/* deploy/academics/
          cp academics/dist/index.html deploy/academics/404.html
          if [ -d "academics/landing/dist" ]; then
            cp -r academics/landing/dist/* deploy/
            cp academics/landing/dist/index.html deploy/404.html
          elif [ -d "landing/dist" ]; then
            cp -r landing/dist/* deploy/
            cp landing/dist/index.html deploy/404.html
          else
            cp academics/dist/index.html deploy/404.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
