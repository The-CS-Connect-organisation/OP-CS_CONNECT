name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build academics
      - name: Install academics deps
        run: npm install
        working-directory: academics

      - name: Build academics
        run: npm run build
        working-directory: academics
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Build management
      - name: Install management deps
        run: npm install
        working-directory: management

      - name: Build management
        run: npm run build
        working-directory: management
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Combine both builds
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy/academics
          mkdir -p deploy/management
          cp -r academics/dist/* deploy/academics/
          cp -r management/dist/* deploy/management/

          # 404.html for academics — redirects back to index with path preserved
          cat > deploy/academics/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <script>
              var l = window.location;
              var base = l.pathname.split('/').slice(0, 3).join('/');
              l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                base + '/?p=' + encodeURIComponent(l.pathname.slice(base.length) + l.search) +
                (l.hash || '')
              );
            </script>
          </head>
          <body></body>
          </html>
          EOF

          # 404.html for management — same trick
          cat > deploy/management/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <script>
              var l = window.location;
              var base = l.pathname.split('/').slice(0, 3).join('/');
              l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                base + '/?p=' + encodeURIComponent(l.pathname.slice(base.length) + l.search) +
                (l.hash || '')
              );
            </script>
          </head>
          <body></body>
          </html>
          EOF

          # Inject the redirect receiver into academics index.html
          sed -i 's|<head>|<head><script>!function(){var e=window.location.search;if(e){var t=new URLSearchParams(e),p=t.get("p");if(p){window.history.replaceState(null,null,p);}}}();</script>|' deploy/academics/index.html

          # Inject the redirect receiver into management index.html
          sed -i 's|<head>|<head><script>!function(){var e=window.location.search;if(e){var t=new URLSearchParams(e),p=t.get("p");if(p){window.history.replaceState(null,null,p);}}}();</script>|' deploy/management/index.html
          # Root landing page
          cat > deploy/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Cornerstone SchoolSync</title>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
            <style>
              *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
              :root {
                --bg: #0a0a0f;
                --surface: #111118;
                --border: rgba(255,255,255,0.08);
                --border-hover: rgba(255,255,255,0.18);
                --text: #f8fafc;
                --muted: #64748b;
                --accent-blue: #3b82f6;
                --accent-purple: #8b5cf6;
                --accent-green: #10b981;
                --accent-orange: #f59e0b;
              }
              html, body { height: 100%; }
              body {
                font-family: 'Inter', sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem;
                overflow-x: hidden;
              }
              /* Background grid */
              body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image:
                  linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
                background-size: 48px 48px;
                pointer-events: none;
                z-index: 0;
              }
              /* Glow blobs */
              .blob {
                position: fixed;
                border-radius: 50%;
                filter: blur(120px);
                pointer-events: none;
                z-index: 0;
                animation: pulse 8s ease-in-out infinite;
              }
              .blob-1 { width: 600px; height: 600px; background: rgba(59,130,246,0.07); top: -200px; left: -200px; }
              .blob-2 { width: 500px; height: 500px; background: rgba(139,92,246,0.06); bottom: -150px; right: -150px; animation-delay: 3s; }
              @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

              .container {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 900px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 3rem;
              }

              /* Logo + title */
              .header { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; text-align: center; }
              .logo-wrap {
                position: relative;
                width: 96px; height: 96px;
                display: flex; align-items: center; justify-content: center;
              }
              .logo-wrap::before {
                content: '';
                position: absolute;
                inset: -12px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
                animation: pulse 4s ease-in-out infinite;
              }
              .logo-wrap img {
                width: 96px; height: 96px;
                object-fit: contain;
                border-radius: 24px;
                position: relative;
                z-index: 1;
                filter: drop-shadow(0 8px 32px rgba(99,102,241,0.3));
              }
              .school-name {
                font-size: clamp(1.5rem, 4vw, 2.5rem);
                font-weight: 800;
                letter-spacing: -0.03em;
                background: linear-gradient(135deg, #f8fafc 0%, #94a3b8 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                line-height: 1.1;
              }
              .tagline {
                font-size: 0.875rem;
                color: var(--muted);
                font-weight: 400;
                letter-spacing: 0.05em;
                text-transform: uppercase;
              }

              /* Divider */
              .divider {
                width: 100%;
                height: 1px;
                background: linear-gradient(90deg, transparent, var(--border), transparent);
              }

              /* Portal cards */
              .cards {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 1.25rem;
                width: 100%;
              }
              .card {
                position: relative;
                display: flex;
                flex-direction: column;
                gap: 1.25rem;
                padding: 2rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 20px;
                text-decoration: none;
                color: inherit;
                transition: all 0.3s ease;
                overflow: hidden;
                cursor: pointer;
              }
              .card::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 20px;
                opacity: 0;
                transition: opacity 0.3s;
              }
              .card:hover { border-color: var(--border-hover); transform: translateY(-4px); box-shadow: 0 24px 48px rgba(0,0,0,0.4); }
              .card-academics::before { background: radial-gradient(ellipse at top left, rgba(59,130,246,0.08), transparent 60%); }
              .card-management::before { background: radial-gradient(ellipse at top left, rgba(139,92,246,0.08), transparent 60%); }
              .card:hover::before { opacity: 1; }

              .card-icon {
                width: 52px; height: 52px;
                border-radius: 14px;
                display: flex; align-items: center; justify-content: center;
                font-size: 1.5rem;
                border: 1px solid var(--border);
                position: relative;
                z-index: 1;
              }
              .card-academics .card-icon { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
              .card-management .card-icon { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.2); }

              .card-body { position: relative; z-index: 1; }
              .card-title { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.375rem; }
              .card-desc { font-size: 0.8125rem; color: var(--muted); line-height: 1.6; }

              .card-roles {
                display: flex; flex-wrap: wrap; gap: 0.5rem;
                position: relative; z-index: 1;
              }
              .role-pill {
                font-size: 0.6875rem;
                font-weight: 600;
                padding: 0.25rem 0.75rem;
                border-radius: 999px;
                border: 1px solid var(--border);
                color: var(--muted);
                background: rgba(255,255,255,0.03);
                letter-spacing: 0.03em;
              }
              .card-academics .role-pill.highlight { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); color: #93c5fd; }
              .card-management .role-pill.highlight { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.3); color: #c4b5fd; }

              .card-arrow {
                position: absolute;
                bottom: 1.5rem; right: 1.5rem;
                width: 36px; height: 36px;
                border-radius: 50%;
                background: rgba(255,255,255,0.05);
                border: 1px solid var(--border);
                display: flex; align-items: center; justify-content: center;
                transition: all 0.3s;
                z-index: 1;
              }
              .card:hover .card-arrow { background: rgba(255,255,255,0.1); border-color: var(--border-hover); transform: translate(2px, -2px); }
              .card-arrow svg { width: 16px; height: 16px; stroke: var(--muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

              /* Footer */
              .footer { font-size: 0.75rem; color: #334155; text-align: center; }

              @media (max-width: 600px) {
                .cards { grid-template-columns: 1fr; }
                .card { padding: 1.5rem; }
              }
            </style>
          </head>
          <body>
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>

            <div class="container">
              <div class="header">
                <div class="logo-wrap">
                  <img src="./academics/logo.png" alt="Cornerstone School" onerror="this.style.display='none'" />
                </div>
                <div>
                  <div class="school-name">Cornerstone SchoolSync</div>
                  <div class="tagline" style="margin-top:0.5rem">Next-Gen School Management System</div>
                </div>
              </div>

              <div class="divider"></div>

              <div class="cards">
                <a href="./academics/" class="card card-academics">
                  <div class="card-icon">🎓</div>
                  <div class="card-body">
                    <div class="card-title">Academics Portal</div>
                    <div class="card-desc">Access assignments, grades, attendance, timetables, AI assistant, and more.</div>
                  </div>
                  <div class="card-roles">
                    <span class="role-pill highlight">Students</span>
                    <span class="role-pill highlight">Teachers</span>
                    <span class="role-pill">Parents</span>
                  </div>
                  <div class="card-arrow">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                  </div>
                </a>

                <a href="./management/" class="card card-management">
                  <div class="card-icon">🏢</div>
                  <div class="card-body">
                    <div class="card-title">Management Portal</div>
                    <div class="card-desc">School administration, HR, payroll, fee management, and institutional oversight.</div>
                  </div>
                  <div class="card-roles">
                    <span class="role-pill highlight">Admins</span>
                    <span class="role-pill highlight">HODs</span>
                    <span class="role-pill">Staff</span>
                  </div>
                  <div class="card-arrow">
                    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                  </div>
                </a>
              </div>

              <div class="footer">
                Cornerstone International School &nbsp;·&nbsp; Powered by SchoolSync
              </div>
            </div>
          </body>
          </html>
          HTMLEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
