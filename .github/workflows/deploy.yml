name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build landing (unified entry point)
      - name: Install landing deps
        run: npm install
        working-directory: landing

      - name: Build landing
        run: npm run build
        working-directory: landing

      # Build academics
      - name: Install academics deps
        run: npm install
        working-directory: academics

      - name: Build academics
        run: npm run build
        working-directory: academics
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Build management
      - name: Install management deps
        run: npm install
        working-directory: management

      - name: Build management
        run: npm run build
        working-directory: management
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Combine all three builds
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy/academics
          mkdir -p deploy/management
          # Landing app goes to root (replaces static index.html)
          cp -r landing/dist/* deploy/
          cp -r academics/dist/* deploy/academics/
          cp -r management/dist/* deploy/management/
          # Fix client-side routing on GitHub Pages
          cp deploy/academics/index.html deploy/academics/404.html
          cp deploy/management/index.html deploy/management/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
